<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Make it your own — The Cartographer's Desk</title>
<style>
  :root { color-scheme: light dark; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #efe6d2;
    color: #3a3226;
    font: 16px/1.5 ui-serif, Georgia, "Times New Roman", serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 4vmin; box-sizing: border-box;
  }
  .wrap { width: min(960px, 100%); text-align: center; }
  .kicker { font: 600 13px/1 ui-monospace, Menlo, monospace; letter-spacing: .18em;
            text-transform: uppercase; color: #a08b63; margin-bottom: .6rem; }
  h1 { font-size: clamp(1.5rem, 4vw, 2.4rem); margin: 0 0 1.1rem; font-weight: 700; }
  video { width: 100%; height: auto; border-radius: 10px;
          box-shadow: 0 10px 40px rgba(60,45,25,.25); background: #000; }
  p { color: #6b5d47; margin: 1.1rem 0 0; }
  a { color: #b4622a; text-decoration: none; font-weight: 600; }
  a:hover { text-decoration: underline; }
  @media (prefers-color-scheme: dark) {
    body { background: #241f18; color: #e9dfca; }
    p { color: #b6a888; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="kicker">The Cartographer's Desk</div>
    <h1>Make it your own — a 2-minute walkthrough</h1>
    <video controls playsinline preload="metadata" poster="poster.png">
      <source src="make-your-own.mp4" type="video/mp4">
      Your browser can't play this video —
      <a href="make-your-own.mp4">download it here</a>.
    </video>
    <p>Swap the fox for your own traveler and deploy your own map, start to finish. &nbsp;·&nbsp;
       <a href="../">Back to the repo</a></p>
  </div>
</body>
</html>
