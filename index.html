<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
import { MAP } from './map.config.js';

/* ────────────────────────────────────────────────────────────────
   The Cartographer's Desk — a hand-painted world you scroll through.
   Fork of Danney's notebook-world engine (projects/portfolio, the
   mr-panda architecture): flat cutouts on paper, a camera curve + a
   traveler curve, virtual scroll drives progress, the story loops.

   THIS FILE IS THE ENGINE — you don't edit it to make the map yours.
   All the content (name, chapters, notes, aphorisms, which art sits
   where) lives in map.config.js. Edit that, not this.
   ──────────────────────────────────────────────────────────────── */

document.title = MAP.title;
{ const b = document.querySelector('#badge .n'); if (b) b.textContent = MAP.badge; }

const canvas = document.getElementById('world');
let renderer;
try { renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' }); }
catch (e) { document.getElementById('fallback').style.display = 'flex'; throw e; }
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0e8d6);
const camera = new THREE.PerspectiveCamera(41, innerWidth / innerHeight, 0.1, 90);
scene.add(new THREE.AmbientLight(0xffffff, 2.6));
const sunlight = new THREE.DirectionalLight(0xfff2da, 0.5);
sunlight.position.set(4, 10, 6);
scene.add(sunlight);

/* ── world dimensions ── */
const SPAN = 112;          // length of the route
const BRIDGE = 10;         // duplicated opening after SPAN → seamless loop
const PATH_Z = 2.5;        // where the fox rides
const WALL_H = 15;

/* ════════════════ procedural parchment textures ════════════════ */
function ctx2d(w, h) { const c = document.createElement('canvas'); c.width = w; c.height = h; return [c, c.getContext('2d')]; }
function grain(g, w, h, n, alpha) {
  g.save(); g.globalAlpha = alpha;
  for (let i = 0; i < n; i++) { g.fillStyle = Math.random() > .5 ? '#e3d6b8' : '#fffbee';
    g.fillRect(Math.random() * w, Math.random() * h, 1.5, 1.5); }
  g.restore();
}
function wobblyLine(g, x1, y1, x2, y2, seg = 14) {
  g.beginPath(); g.moveTo(x1, y1);
  for (let i = 1; i <= seg; i++) { const t = i / seg;
    g.lineTo(x1 + (x2 - x1) * t + (Math.random() - .5) * 2, y1 + (y2 - y1) * t + (Math.random() - .5) * 2); }
  g.stroke();
}

/* parchment wall with a faint survey grid — tiles along x */
function parchmentWallTexture() {
  const [c, g] = ctx2d(1024, 1024);
  g.fillStyle = '#f4ecd8'; g.fillRect(0, 0, 1024, 1024);
  grain(g, 1024, 1024, 2600, .35);
  g.strokeStyle = 'rgba(139,115,85,0.16)'; g.lineWidth = 1.5;
  for (let y = 64; y < 1024; y += 64) wobblyLine(g, 0, y, 1024, y, 24);
  for (let x = 64; x < 1024; x += 64) wobblyLine(g, x, 0, x, 1024, 24);
  // two slightly stronger "latitude" rules
  g.strokeStyle = 'rgba(139,115,85,0.28)'; g.lineWidth = 2;
  wobblyLine(g, 0, 320, 1024, 320, 24); wobblyLine(g, 0, 704, 1024, 704, 24);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping; t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

/* the map surface the fox rides across — paper with a dotted route */
function mapGroundTexture() {
  const [c, g] = ctx2d(1024, 512);
  g.fillStyle = '#eee2c8'; g.fillRect(0, 0, 1024, 512);
  grain(g, 1024, 512, 1400, .3);
  // faint survey grid
  g.strokeStyle = 'rgba(139,115,85,0.14)'; g.lineWidth = 1.5;
  for (let y = 0; y < 512; y += 52) wobblyLine(g, 0, y, 1024, y, 20);
  for (let x = 0; x < 512 * 2; x += 52) wobblyLine(g, x, 0, x, 512, 10);
  // soft ochre wash blotches (the painted-map feel)
  g.globalAlpha = .12; g.fillStyle = '#d9b46a';
  for (let i = 0; i < 8; i++) {
    g.beginPath();
    g.ellipse(Math.random() * 1024, Math.random() * 512, 90 + Math.random() * 140, 40 + Math.random() * 60, Math.random(), 0, Math.PI * 2);
    g.fill();
  }
  g.globalAlpha = 1;
  // the dotted route the fox travels (maps to z = PATH_Z on an 8-deep ground)
  const pathY = 160;
  g.strokeStyle = 'rgba(176,80,60,.75)'; g.lineWidth = 5; g.lineCap = 'round';
  g.setLineDash([2, 26]);
  g.beginPath(); g.moveTo(0, pathY);
  for (let x = 32; x <= 1024; x += 32) g.lineTo(x, pathY + (Math.random() - .5) * 10);
  g.stroke();
  g.setLineDash([]);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = THREE.RepeatWrapping; t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

/* inked compass rose */
function compassRoseTexture() {
  const [c, g] = ctx2d(256, 256);
  g.translate(128, 128);
  g.strokeStyle = '#6d5c43'; g.fillStyle = 'rgba(253,246,230,.6)'; g.lineWidth = 4;
  g.beginPath(); g.arc(0, 0, 66, 0, Math.PI * 2); g.fill(); g.stroke();
  g.lineWidth = 2; g.beginPath(); g.arc(0, 0, 52, 0, Math.PI * 2); g.stroke();
  for (let i = 0; i < 8; i++) {
    const a = i / 8 * Math.PI * 2, L = i % 2 ? 44 : 62;
    g.beginPath(); g.moveTo(0, 0); g.lineTo(Math.cos(a) * L, Math.sin(a) * L);
    g.lineWidth = i % 2 ? 2 : 3.5; g.stroke();
  }
  // north needle
  g.fillStyle = '#b0503c';
  g.beginPath(); g.moveTo(0, -62); g.lineTo(9, -6); g.lineTo(-9, -6); g.closePath(); g.fill();
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

/* handwritten note (paper card + text), returns texture + aspect */
function noteTexture({ lines, font = '600 46px "Caveat"', ink = '#3b2f21', paper = '#fdf6e6',
                       pin = '#b0503c', w = 640, pad = 34, title = null }) {
  const lh = 56;
  const [, mg] = ctx2d(8, 8);
  mg.font = font;
  let need = Math.max(...lines.map(ln => mg.measureText(ln).width));
  if (title) { mg.font = '600 54px "Caveat"'; need = Math.max(need, mg.measureText(title).width); }
  w = Math.max(w, Math.ceil(need) + pad * 2 + 8);
  const h = pad * 2 + lines.length * lh + (title ? 64 : 0) + 12;
  const [c, g] = ctx2d(w, h);
  g.fillStyle = paper;
  g.strokeStyle = '#a99476'; g.lineWidth = 4;
  g.beginPath(); g.roundRect(4, 4, w - 8, h - 8, 10); g.fill(); g.stroke();
  grain(g, w, h, 250, .3);
  if (pin) { g.fillStyle = pin; g.beginPath(); g.arc(w / 2, 22, 11, 0, Math.PI * 2); g.fill();
    g.strokeStyle = 'rgba(0,0,0,.25)'; g.lineWidth = 2; g.stroke(); }
  let y = pad + (pin ? 26 : 10);
  if (title) { g.font = '600 54px "Caveat"'; g.fillStyle = '#8a4d2c';
    g.fillText(title, pad, y + 40); y += 64; }
  g.font = font; g.fillStyle = ink;
  for (const ln of lines) { y += lh; g.fillText(ln, pad, y); }
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  return { tex: t, aspect: w / h };
}

/* free handwriting straight on the map (no card) */
function writingTexture({ lines, font = '600 84px "Caveat"', ink = '#4a3a28', w = 1024, align = 'left' }) {
  const [, mg] = ctx2d(8, 8);
  mg.font = font;
  const maxw = Math.max(...lines.map(ln => mg.measureText(ln).width));
  if (maxw > w - 32) {
    const px = parseFloat(font.match(/(\d+(?:\.\d+)?)px/)[1]);
    font = font.replace(/\d+(?:\.\d+)?px/, Math.floor(px * (w - 32) / maxw) + 'px');
  }
  const lh = 96;
  const h = lines.length * lh + 40;
  const [c, g] = ctx2d(w, h);
  g.clearRect(0, 0, w, h);
  g.font = font; g.fillStyle = ink;
  let y = 10;
  for (const ln of lines) {
    y += lh;
    const x = align === 'center' ? (w - g.measureText(ln).width) / 2 : 16;
    g.fillText(ln, x, y);
  }
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  return { tex: t, aspect: w / h };
}

/* waypoint stamp — ◈ WP·NN inked low by the route */
function waypointTexture(label) {
  const [c, g] = ctx2d(256, 96);
  g.clearRect(0, 0, 256, 96);
  g.font = '600 44px "Caveat"'; g.fillStyle = '#b0503c';
  g.fillText('◈ ' + label, 12, 58);
  g.strokeStyle = 'rgba(176,80,60,.6)'; g.lineWidth = 2.5;
  g.beginPath(); g.roundRect(4, 12, g.measureText('◈ ' + label).width + 24, 62, 8); g.stroke();
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  return { tex: t, aspect: 256 / 96 };
}

/* ════════════════ world building ════════════════ */
const animated = [];   // {obj, fn(t)}
const texLoader = new THREE.TextureLoader();
let pending = 0, loaded = 0;
function tick() { loaded++; document.getElementById('loadbar').style.width = Math.round(loaded / Math.max(pending, 1) * 100) + '%'; }

/* handwriting IS the texture — block world-build until fonts load */
await Promise.all([
  document.fonts.load('46px "Patrick Hand"'),
  document.fonts.load('500 64px "Caveat"'),
  document.fonts.load('600 84px "Caveat"'),
]).catch(() => {});

/* wall + ground */
{
  const wallT = parchmentWallTexture();
  wallT.repeat.set((SPAN + BRIDGE + 30) / 15, 1);
  const wall = new THREE.Mesh(
    new THREE.PlaneGeometry(SPAN + BRIDGE + 30, WALL_H),
    new THREE.MeshBasicMaterial({ map: wallT })
  );
  wall.position.set((SPAN + BRIDGE) / 2, WALL_H / 2 - 0.5, 0);
  scene.add(wall);

  // rust margin ticks every ~14 units — deterministic, duplicated across the loop seam
  const marginXs = [];
  for (let x = 7; x < SPAN; x += 14) marginXs.push(x);
  marginXs.push(7 + SPAN, -7);
  for (const x of [...new Set(marginXs)]) {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(0.055, WALL_H),
      new THREE.MeshBasicMaterial({ color: 0xb0503c, transparent: true, opacity: .3 }));
    m.position.set(x, WALL_H / 2 - 0.5, 0.01);
    scene.add(m);
  }

  const gT = mapGroundTexture();
  gT.repeat.set((SPAN + BRIDGE + 30) / 12, 1);
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(SPAN + BRIDGE + 30, 8),
    new THREE.MeshBasicMaterial({ map: gT })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.set((SPAN + BRIDGE) / 2, 0, 4);
  scene.add(ground);

  const rose = new THREE.Mesh(new THREE.PlaneGeometry(2.4, 2.4),
    new THREE.MeshBasicMaterial({ map: compassRoseTexture(), transparent: true }));
  rose.position.set(14.6, 6.6, 0.05);
  scene.add(rose);
  animated.push({ obj: rose, fn: t => { rose.rotation.z = Math.sin(t * .3) * .05; } });
}

/* helper — a standing cutout from an image file (project assets/) */
function cutout(file, { x, h = 3, z = PATH_Z, y = null, sway = .02, bob = 0, phase = Math.random() * 6, flip = false, wallPin = false, framed = false }) {
  pending++;
  texLoader.load('assets/' + file, tex => {
    tick();
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
    const a = tex.image.width / tex.image.height;
    const geo = new THREE.PlaneGeometry(h * a, h);
    const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, alphaTest: 0.05 });
    const m = new THREE.Mesh(geo, mat);
    const baseY = y === null ? h / 2 : y;
    m.position.set(x, baseY, wallPin ? 0.03 : z);
    if (flip) m.scale.x = -1;
    if (framed) {
      const fr = new THREE.Mesh(new THREE.PlaneGeometry(h * a + .24, h + .24),
        new THREE.MeshBasicMaterial({ color: 0xfdf6e6 }));
      fr.position.set(x, baseY, (wallPin ? 0.03 : z) - .005);
      scene.add(fr);
    }
    scene.add(m);
    animated.push({ obj: m, fn: t => {
      m.rotation.z = Math.sin(t * .9 + phase) * sway;
      if (bob) m.position.y = baseY + Math.sin(t * 1.1 + phase) * bob;
    }});
  }, undefined, () => { tick(); console.warn('missing cutout', file); });
}

/* helper — canvas texture plane */
function place(texObj, { x, y, z = 0.04, h = 2, tilt = 0 }) {
  texObj.tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(h * texObj.aspect, h),
    new THREE.MeshBasicMaterial({ map: texObj.tex, transparent: true })
  );
  m.position.set(x, y, z); m.rotation.z = tilt;
  scene.add(m);
  return m;
}

function waypoint(label, x) {
  place(waypointTexture(label), { x, y: 1.05, h: .62, z: 0.05, tilt: -.02 });
}

/* ════════════════ THE ROUTE — built from map.config.js ════════════════
   Everything here is placement plumbing; the CONTENT lives in MAP. Each
   chapter becomes a waypoint stamp + a pinned note + an inked aphorism +
   any painted art/props, laid out west→east and looped seamlessly. */

const CH_START = 15.2, CH_STEP = 16;              // default chapter cadence along x
const RIDE_PAD = 1.2, RIDE_LEN = 16;              // a ride owns [wpX−PAD, wpX−PAD+LEN]
const wpXof = (ch, i) => ch.wpX ?? (CH_START + i * CH_STEP);

// a painted cutout from an art/prop spec {file, x, y?, h, wallPin?, framed?, zBack?, sway?, flip?, bob?}
function paintSpec(a, ox = 0) {
  const o = { x: a.x + ox, h: a.h ?? 3, sway: a.sway ?? .02 };
  if (a.y != null) o.y = a.y;
  if (a.wallPin) o.wallPin = true;
  if (a.framed)  o.framed = true;
  if (a.flip)    o.flip = true;
  if (a.bob)     o.bob = a.bob;
  if (!a.wallPin && a.zBack != null) o.z = PATH_Z - a.zBack;
  cutout(a.file, o);
}
// a pinned note card {title?, lines, pin?, font?, w?, x?, y?, h?, z?, tilt?}
function noteSpec(n, i, cx, ox = 0) {
  place(noteTexture({ title: n.title ?? null, lines: n.lines, pin: n.pin, font: n.font, w: n.w }),
        { x: (n.x ?? cx + 2.5) + ox, y: n.y ?? 5.9, h: n.h ?? 2.3, z: n.z ?? .07,
          tilt: n.tilt ?? (i % 2 ? .03 : -.03) });
}
// free handwriting (aphorism / closing line) {lines, ink?, font?, align?, w?, x?, y?, h?, z?, tilt?}
function writeSpec(w, i, cx, ox = 0) {
  place(writingTexture({ lines: w.lines, font: w.font ?? '600 58px "Caveat"',
                         ink: w.ink ?? '#6d5c43', align: w.align, w: w.w }),
        { x: (w.x ?? cx + 11) + ox, y: w.y ?? 6.8, h: w.h ?? 1.0, z: w.z ?? .07,
          tilt: w.tilt ?? (i % 2 ? -.02 : .02) });
}
// one chapter, placed at offset ox (0 real, −SPAN for the loop-seam copy of the finale)
function buildChapter(ch, i, ox = 0) {
  const cx = wpXof(ch, i);
  waypoint(ch.wp ?? ('WP·' + String(i).padStart(2, '0')), cx + ox);
  for (const a of ch.art   ?? []) paintSpec(a, ox);
  for (const p of ch.props ?? []) paintSpec(p, ox);
  if (ch.note) noteSpec(ch.note, i, cx, ox);
  for (const n of ch.extraNotes   ?? []) noteSpec(n, i, cx, ox);
  if (ch.aphorism) writeSpec(ch.aphorism, i, cx, ox);
  for (const w of ch.extraWriting ?? []) writeSpec(w, i, cx, ox);
}

function buildOpening(ox) {   // ox = 0 real opening, SPAN = loop-bridge copy
  const o = MAP.opening, pl = o.place ?? {};
  const hl = pl.headline ?? {};
  place(writingTexture({ lines: o.headline ?? ['The Field Map of', MAP.badge],
                         font: hl.font ?? '700 96px "Caveat"', ink: hl.ink ?? '#3b2f21', align: 'center' }),
    { x: (hl.x ?? 5.2) + ox, y: hl.y ?? 5.0, h: hl.h ?? 2.6, tilt: hl.tilt ?? -.02 });
  if (o.tagline) { const t = pl.tagline ?? {};
    place(writingTexture({ lines: [o.tagline], font: t.font ?? '500 58px "Caveat"', ink: t.ink ?? '#8a765a', align: 'center' }),
      { x: (t.x ?? 5.2) + ox, y: t.y ?? 6.6, h: t.h ?? .8, z: t.z ?? .06 }); }
  if (o.arc) { const a = pl.arc ?? {};
    place(writingTexture({ lines: [o.arc], font: a.font ?? '500 52px "Caveat"', ink: a.ink ?? '#6d5c43', w: a.w ?? 1400 }),
      { x: (a.x ?? 5.4) + ox, y: a.y ?? 3.4, h: a.h ?? .72, z: a.z ?? .06, tilt: a.tilt ?? .015 }); }
  if (o.hero?.image) { const h = pl.hero ?? {};
    cutout(o.hero.image, { x: (h.x ?? 11.3) + ox, y: h.y ?? 4.7, h: h.h ?? 3.1, wallPin: true, framed: true, sway: h.sway ?? .008 });
    if (o.hero.caption) { const c = pl.caption ?? {};
      place(writingTexture({ lines: [o.hero.caption], font: c.font ?? '500 44px "Caveat"', ink: c.ink ?? '#8a765a' }),
        { x: (c.x ?? 11.3) + ox, y: c.y ?? 2.85, h: c.h ?? .5, z: c.z ?? .05 }); } }
  for (const p of o.props ?? []) paintSpec(p, ox);
}

/* build the world: opening, every chapter, then the seam copies */
buildOpening(0);
MAP.chapters.forEach((ch, i) => buildChapter(ch, i, 0));
// duplicate the finale one route-length WEST + the opening one length EAST,
// so scrolling past the last chapter wraps back to the title with no seam
MAP.chapters.forEach((ch, i) => { if (ch.finale) buildChapter(ch, i, -SPAN); });
buildOpening(SPAN);

/* ════════════════ the traveler — the fox and his vehicles ════════════════ */
const foxGroup = new THREE.Group();
foxGroup.scale.setScalar(MAP.mascot.scale ?? 1.15);   // ensemble size (Danney round-3)
scene.add(foxGroup);
let foxM = null;
function traveler(file, h, yOff, assign) {
  pending++;
  texLoader.load('assets/' + file, tex => {
    tick();
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
    const a = tex.image.width / tex.image.height;
    const m = new THREE.Mesh(new THREE.PlaneGeometry(h * a, h),
      // DoubleSide: scrolling backward flips the group 180° to face travel
      // depthTest off + top renderOrder: the traveler ALWAYS composites nearest to the
      // screen — never sinks behind terrain/prop art (within the group, add order still
      // keeps the vehicle over the fox's tucked butt)
      new THREE.MeshBasicMaterial({ map: tex, transparent: true, alphaTest: 0.05, side: THREE.DoubleSide,
        depthTest: false, depthWrite: false }));
    m.position.y = h / 2 + yOff;
    m.renderOrder = 30;
    foxGroup.add(m);
    assign(m);
  }, undefined, () => { tick(); console.warn('missing', file); });
}
// mascot sprites (the idle/sitting pose + two trot frames). yOff cancels a PNG's
// transparent bottom padding so paws/wheels/treads meet the road; the plane stays airborne.
const MASCOT = MAP.mascot;
traveler(MASCOT.sit.file,   MASCOT.sit.h,   MASCOT.sit.yOff ?? 0, m => { foxM = m; });
let walkA = null, walkB = null;
traveler(MASCOT.walkA.file, MASCOT.walkA.h, MASCOT.walkA.yOff ?? 0, m => { walkA = m; m.visible = false; });
traveler(MASCOT.walkB.file, MASCOT.walkB.h, MASCOT.walkB.yOff ?? 0, m => { walkB = m; m.visible = false; });

// vehicles keyed by id, + the ride windows derived from the chapters that declare a `ride`.
// A chapter's ride owns [wpX−PAD, wpX−PAD+LEN] — which reproduces the hand-tuned windows.
const vehMesh = {};                                   // id → mesh
const PERCH = { foot: MASCOT.sit.perch ?? [-.19, 0] };  // fox perch [y, x] per mode
for (const [id, v] of Object.entries(MAP.vehicles ?? {})) {
  traveler(v.file, v.h, v.yOff ?? 0, m => { vehMesh[id] = m; m.visible = false; });
  PERCH[id] = v.perch ?? [0, 0];
}
const RIDES = MAP.chapters.flatMap((ch, i) => {
  if (!ch.ride) return [];
  const cx = wpXof(ch, i);
  return [{ id: ch.ride, min: cx - RIDE_PAD, max: cx - RIDE_PAD + RIDE_LEN, flies: !!MAP.vehicles[ch.ride]?.flies }];
});
const rideAt = px => RIDES.find(r => px > r.min && px < r.max) ?? null;

/* ════════════════ curves — camera + fox ════════════════ */
const camCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0.6,  3.2, 15.6),
  new THREE.Vector3(12,   3.4, 15.0),
  new THREE.Vector3(25,   3.1, 16.0),
  new THREE.Vector3(40,   3.6, 15.4),
  new THREE.Vector3(54,   3.2, 14.7),
  new THREE.Vector3(68,   3.5, 15.7),
  new THREE.Vector3(84,   3.2, 15.2),
  new THREE.Vector3(98,   3.5, 15.8),
  new THREE.Vector3(104, 3.3, 15.6),
  new THREE.Vector3(SPAN + 0.6, 3.2, 15.6),   // end = start + SPAN → invisible wrap
]);
const foxCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(-1.5, 0, PATH_Z),
  new THREE.Vector3(20,  0, PATH_Z + .3),
  new THREE.Vector3(46,  0, PATH_Z - .3),
  new THREE.Vector3(70,  0, PATH_Z + .2),
  new THREE.Vector3(96,  0, PATH_Z),
  new THREE.Vector3(SPAN - 1.5, 0, PATH_Z), // end = start + SPAN
]);

/* ════════════════ virtual infinite scroll ════════════════ */
let targetP = 0, p = 0;
// the instruction hint: shown on reveal, hidden while travelling, re-shown after idle
let hintTimer = null;
const hintEl = document.getElementById('hint');
function showHint() { hintEl.classList.add('show'); }
function bumpHint() { hintEl.classList.remove('show'); clearTimeout(hintTimer); hintTimer = setTimeout(showHint, 7000); }
// scroll / swipe / arrow UP travels forward (east); DOWN goes back
const WHEEL_K = 0.00007;
addEventListener('wheel', e => { targetP -= e.deltaY * WHEEL_K; bumpHint(); }, { passive: true });
let lastTouch = null;
addEventListener('touchstart', e => { lastTouch = e.touches[0].clientY; }, { passive: true });
addEventListener('touchmove', e => {
  if (lastTouch !== null) { targetP += (lastTouch - e.touches[0].clientY) * WHEEL_K * 5; lastTouch = e.touches[0].clientY; bumpHint(); }
}, { passive: true });
addEventListener('keydown', e => {
  if (e.key === 'ArrowUp' || e.key === 'PageUp' || e.key === ' ') { targetP += .012; bumpHint(); }
  if (e.key === 'ArrowDown' || e.key === 'PageDown') { targetP -= .012; bumpHint(); }
});
const wrap1 = v => ((v % 1) + 1) % 1;

/* test/debug hooks + ?p= deep-seek for headless QA */
window.__worldSeek = v => { targetP = v; };
window.__scene = scene;
window.__worldState = () => ({ p, targetP, cam: camera.position.toArray(),
  travelers: { fox: !!foxM, ...Object.fromEntries(Object.keys(MAP.vehicles ?? {}).map(id => [id, !!vehMesh[id]])) },
  fox: (foxM && walkA && walkB) ? {
    sitVisible: foxM.visible, walkVisible: walkA.visible || walkB.visible,
    sitH: foxM.geometry.parameters.height, walkH: walkA.geometry.parameters.height,
    sitY: +foxM.position.y.toFixed(3), groupY: +foxGroup.position.y.toFixed(3),
    scale: +foxGroup.scale.x.toFixed(2),
    topLayer: foxM.renderOrder === 30 && !foxM.material.depthTest,
  } : null,
  pending, loaded });
const QA = new URLSearchParams(location.search).has('qa');
{
  const q = new URLSearchParams(location.search);
  if (q.has('p')) { p = targetP = Math.max(0, Math.min(.999, parseFloat(q.get('p')) || 0)); }
}

let mx = 0, my = 0;
addEventListener('pointermove', e => {
  mx = (e.clientX / innerWidth - .5) * 2; my = (e.clientY / innerHeight - .5) * 2;
}, { passive: true });

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ════════════════ render loop ════════════════ */
const look = new THREE.Vector3();
const kmEl = document.getElementById('km');
let lastKm = -1, flightY = 0;
let last = performance.now(), shown = false, warmed = false;
renderer.setAnimationLoop(now => {
  const dt = Math.min((now - last) / 1000, .05); last = now;
  if (window.__ft) window.__ft.push(now - (window.__ftLast ?? now)), window.__ftLast = now;   // QA jank probe
  const t = now / 1000;

  // damp progress toward target; wrap both together so the seam never shows
  let d = targetP - p;
  p += d * (1 - Math.exp(-3.5 * dt));
  if (p >= 1 && targetP >= 1) { p -= 1; targetP -= 1; }
  if (p < 0 && targetP < 0)   { p += 1; targetP += 1; }
  const cp = Math.max(0, Math.min(wrap1(p), 1));

  // camera along its curve — getPointAt (arc length) keeps camera & fox in lockstep
  camCurve.getPointAt(cp, camera.position);
  const camX = camera.position.x;
  camera.position.x += mx * .25;
  camera.position.y += -my * .18;
  look.set(camX + 1.7, 2.5, 0.5);   // constant gaze lead → the wrap stays seamless
  camera.lookAt(look);

  // the fox rides a fixed lead ahead of the camera; x follows the camera
  // continuously (seam-window content duplicated at ±SPAN); z from his own curve
  const px = camX + 1.6;
  foxCurve.getPointAt(wrap1((px + 1.5) / SPAN), foxGroup.position);
  foxGroup.position.x = px;

  const ride = rideAt(px);
  const mode = ride ? ride.id : 'foot';
  const flying = !!(ride && ride.flies);
  for (const [id, m] of Object.entries(vehMesh)) m.visible = (mode === id);
  // on foot + moving → 2-frame trot cycle; at rest (or riding) → the sitting fox
  const onFootWalking = mode === 'foot' && Math.abs(d) > 0.0008 && walkA && walkB;
  if (foxM) {
    const [py, pxo] = PERCH[mode] ?? PERCH.foot;
    foxM.position.y = MASCOT.sit.h / 2 + py;
    foxM.position.x = pxo;
    foxM.visible = !onFootWalking;
  }
  if (walkA && walkB) {
    const gait = Math.floor(t * 7) % 2 === 0;
    walkA.visible = onFootWalking && gait;
    walkB.visible = onFootWalking && !gait;
  }

  // flight: a flying ride (the plane) lifts the whole group off the route
  const targetFlight = flying ? 3.3 : 0;
  flightY += (targetFlight - flightY) * (1 - Math.exp(-4.5 * dt));

  if (flying) {
    foxGroup.position.y = flightY + Math.sin(t * 1.3) * .12;
    foxGroup.rotation.z = Math.sin(t * .9) * .03;
  } else if (mode === 'foot') {
    foxGroup.position.y = flightY + Math.abs(Math.sin(t * 6)) * .05;   // trot
    foxGroup.rotation.z = Math.sin(t * 6) * .02;
  } else {
    foxGroup.position.y = flightY + Math.abs(Math.sin(t * 7)) * .04;   // engine judder
    foxGroup.rotation.z = Math.sin(t * 7) * .02;
  }
  const vel = d;
  foxGroup.rotation.y = vel < -0.0001 ? Math.PI : 0;                   // face travel direction
  foxGroup.rotation.z += Math.max(-.12, Math.min(.12, vel * 18));

  // odometer HUD
  const km = Math.round(cp * (MAP.odometerKm ?? 5600) / 10) * 10;
  if (km !== lastKm) { lastKm = km; kmEl.textContent = km.toLocaleString('en-US'); }

  for (const a of animated) a.fn(t);
  renderer.render(scene, camera);

  if (!shown) { shown = true;
    // ?qa: kill the loader instantly — CSS transitions run on the compositor's
    // real clock, so headless virtual-time screenshots never see the fade finish
    if (QA) { document.getElementById('loader').style.display = 'none'; }
  }
  // once every texture is in, render each scene offscreen once so GPU uploads
  // happen behind the loader, not as hitches mid-scroll — THEN reveal the world
  if (!warmed && pending > 0 && loaded >= pending) {
    warmed = true;
    const keep = camera.position.clone();
    for (const wp of [.12, .25, .38, .5, .62, .75, .88]) {
      camCurve.getPointAt(wp, camera.position);
      look.set(camera.position.x + 1.7, 2.5, 0.5); camera.lookAt(look);
      renderer.render(scene, camera);
    }
    camera.position.copy(keep);
    if (!QA) {
      document.getElementById('loader').classList.add('done');
      showHint();   // the up/down instruction, until the traveller starts moving
    }
  }
});
</script>
</body>
</html>
